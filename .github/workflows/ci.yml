name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.6.2

  go-build-and-test:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Download dependencies
        run: go mod download

      - name: Build connector
        run: go build -v ./cmd/connector

      - name: Build migrator
        run: go build -v ./cmd/migrator

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-build-and-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build connector image
        run: docker build -f Dockerfile.connector -t connector:${{ github.sha }} .

      - name: Build migrator image
        run: docker build -f Dockerfile.migrator -t migrator:${{ github.sha }} .
